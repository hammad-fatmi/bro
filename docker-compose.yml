services:
  backend:
    image: ghcr.io/hammad-fatmi/bro/backend
    expose:
      - "3000"
    env_file:
      - ./backend/.env

  frontend:
    image: ghcr.io/hammad-fatmi/bro/frontend
    ports:
      - "80:80"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend