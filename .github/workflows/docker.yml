name: Build & Deploy Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set Image Name
        run: echo "IMAGE=ghcr.io/${{ github.repository }}" >> $GITHUB_ENV

      - name: Build Backend Image
        run: docker build -t $IMAGE/backend ./backend

      - name: Build Frontend Image
        run: docker build -t $IMAGE/frontend ./frontend

      - name: Push Backend Image
        run: docker push $IMAGE/backend

      - name: Push Frontend Image
        run: docker push $IMAGE/frontend

      - name: Deploy on EC2 (Pull & Run)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/bro

            # update repo (optional, for configs only)
            git pull origin main

            # stop old containers
            docker compose down

            # pull latest images from GHCR
            docker pull ghcr.io/${{ github.repository }}/backend
            docker pull ghcr.io/${{ github.repository }}/frontend

            # start containers WITHOUT build
            docker compose up -d